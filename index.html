<style>
:root{
  --parchment:#efe6d3;--parchment2:rgba(239,230,211,0.96);--parchment3:#e2d5b8;

  --ember:#a3402f;--ember-pale:#f7e2dd;
  --teal:#3e7d73;--teal-pale:#e1efec;
  --gold:#c99a2e;--gold-pale:#f8f0d9;
  --border:rgba(42,33,24,0.16);--border2:rgba(42,33,24,0.34);
  --sh:0 2px 14px rgba(10,6,2,0.28);--sh2:0 10px 34px rgba(10,6,2,0.4);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Crimson Text',Georgia,serif;color:var(--parchment);min-height:100vh;-webkit-font-smoothing:antialiased;
  font-size:18px;background:linear-gradient(180deg,#0a1119 0%,#101c28 40%,#182c39 70%,#1f3a3f 100%);}
#root{position:relative;z-index:1;min-height:100vh}
.scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.scene svg{width:100%;height:100%;display:block}
.mtn-far{fill:#152230;opacity:.85}
.mtn-near{fill:#0e1620;opacity:.95}
.water{fill:#0c262b}
.wave{fill:none;stroke:rgba(239,230,211,0.07);stroke-width:2}
.wave.w2{stroke:rgba(239,230,211,0.045)}
.star{fill:#eee2c4;animation:twinkle 4.5s ease-in-out infinite}
.star.s2{animation-delay:1.1s}.star.s3{animation-delay:2.2s}.star.s4{animation-delay:3.1s}.star.s5{animation-delay:.6s}.star.s6{animation-delay:2.7s}
.moon{fill:#efe6d3;opacity:.85}
.moonglow{fill:#efe6d3;opacity:.05}
.ship{animation:drift 30s ease-in-out infinite alternate}
.ship .hull{fill:#0a0f14}
.ship .prow{fill:#0a0f14}
.ship .mast{stroke:#0a0f14;stroke-width:3}
.ship .sail{fill:#d8cca8;opacity:.88}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.85}}
@keyframes drift{0%{transform:translate(-36px,2px)}50%{transform:translate(28px,-8px)}100%{transform:translate(-6px,4px)}}
@media(prefers-reduced-motion:reduce){.ship,.star{animation:none}}

button{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px 26px;border:1px solid var(--border2);
  border-radius:var(--r);background:rgba(239,230,211,0.92);cursor:pointer;font-size:18px;font-family:'Crimson Text',Georgia,serif;
  color:var(--ink);line-height:1.4;transition:all .12s;font-weight:600}
button:hover:not(:disabled){background:rgba(239,230,211,1);transform:translateY(-1px)}
button:active:not(:disabled){transform:scale(.98)}
button:disabled{opacity:.35;cursor:not-allowed}
button.pri{background:var(--bronze);color:#fff;border-color:var(--bronze2)}
button.pri:hover:not(:disabled){background:var(--bronze2)}
button.ghost{background:transparent;border-color:transparent;color:var(--parchment);opacity:.7;font-weight:500}
button.ghost:hover:not(:disabled){opacity:1;background:rgba(239,230,211,0.08)}
input[type=text]{display:block;width:100%;padding:15px 18px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:19px;font-family:'Crimson Text',Georgia,serif;color:var(--ink);background:rgba(239,230,211,0.96);outline:none}
input[type=password]{display:block;width:100%;padding:15px 18px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:19px;color:var(--ink);background:rgba(239,230,211,0.96);outline:none;font-family:inherit}
.disp{font-family:'Cinzel',serif}
.muted{color:var(--ink2)}
.card{background:var(--parchment2);border:1px solid var(--border);border-radius:var(--rm);padding:1.6rem 1.9rem;box-shadow:var(--sh)}
.panel{background:rgba(239,230,211,0.9);border:1px solid var(--border);border-radius:var(--rm);padding:1.3rem 1.6rem}
.rune{text-align:center;font-size:24px;letter-spacing:12px;color:var(--bronze);opacity:.55;margin:26px 0}
.eyebrow{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze);font-weight:700}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.opt{border:1.5px solid var(--border2);border-radius:var(--rm);padding:20px 24px;cursor:pointer;background:rgba(239,230,211,0.95);
  transition:border-color .12s,background .12s,box-shadow .12s}
.opt:hover{border-color:var(--bronze);box-shadow:var(--sh)}
.opt.correct{border:2.5px solid var(--teal);background:var(--teal-pale)}
.opt.wrong{border:2.5px solid var(--ember);background:var(--ember-pale)}
.opt.locked{cursor:default}
.opt.sel{border:2.5px solid var(--bronze);background:var(--bronze-pale)}
.stat-pill{display:flex;align-items:center;gap:9px;background:rgba(239,230,211,0.9);border:1px solid var(--border);
  border-radius:100px;padding:10px 20px 10px 15px}
.stat-pill i{font-size:19px}
.stat-fame i{color:var(--ember)} .stat-wealth i{color:var(--gold)} .stat-land i{color:var(--teal)} .stat-knowledge i{color:var(--bronze)}
.hud{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:26px}
.prog-track{height:8px;background:rgba(239,230,211,0.18);border-radius:4px;overflow:hidden;margin-bottom:26px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--bronze),var(--gold));border-radius:4px;transition:width .4s}
.banner{background:linear-gradient(135deg,#7c5023 0%,#5c3a1a 100%);color:#f7efe0;border-radius:var(--rm);padding:38px 42px;
  margin-bottom:30px;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.25)}
.banner-num{position:absolute;right:26px;top:50%;transform:translateY(-50%);font-size:160px;font-weight:700;opacity:.14;line-height:1;font-family:'Cinzel',serif}
.reveal{border-radius:var(--rm);overflow:hidden;box-shadow:var(--sh2)}
.reveal-pos{border-left:6px solid var(--teal)} .reveal-neg{border-left:6px solid var(--ember)} .reveal-event{border-left:6px solid var(--bronze)}
.reveal-h{padding:16px 20px}
.reveal-h-pos{background:var(--teal-pale)} .reveal-h-neg{background:var(--ember-pale)} .reveal-h-event{background:var(--gold-pale)}
.reveal-body{background:rgba(239,230,211,0.97);padding:22px 20px}
.delta-box{background:rgba(42,33,24,0.05);border-radius:var(--r);padding:12px 16px;margin-top:14px;display:flex;gap:18px;flex-wrap:wrap}
.lbr{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;margin-bottom:9px;border:1px solid var(--border);
  border-radius:var(--r);background:rgba(239,230,211,0.94)}
.lbr.me{border:2px solid var(--bronze);background:var(--bronze-pale)}
.err{background:var(--ember-pale);border:1px solid var(--ember);border-radius:var(--r);padding:16px 20px;font-size:16px;color:var(--ember);margin-bottom:24px}
.ldot{width:9px;height:9px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.swatch{width:36px;height:36px;border-radius:50%;border:2px solid rgba(0,0,0,.2);cursor:pointer;flex-shrink:0}
.swatch.on{border:3px solid var(--parchment);box-shadow:0 0 0 2px var(--bronze)}
.dilemma-progress{font-size:15px;color:var(--parchment);opacity:.75;margin-bottom:12px}
@media(max-width:700px){.g3{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
</style>

async function writeScore(n,color,round,stats,d){
  if(!db)return;
  const key=n.trim().replace(/[.#$[\]/]/g,"_");
  const total=stats.fame+stats.wealth+stats.land+stats.knowledge;
  try{
    await Promise.race([
      db.ref(DB_PATH+"/"+key).set({name:n,color:color||"#b5793a",round,fame:stats.fame,wealth:stats.wealth,land:stats.land,knowledge:stats.knowledge,total,done:d,ts:Date.now()}),
      new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),5000))
    ]);
  }catch(e){console.warn("Score save skipped:",e.message);}
}
async function fetchScores(){if(!db)return[];const s=await db.ref(DB_PATH).get();return s.exists()?Object.values(s.val()).filter(v=>v&&v.name):[];}
async function clearScores(){if(db)await db.ref(DB_PATH).remove();}

    const d=round.dilemmas[dilemmaIdx];
    const isLastDilemma=dilemmaIdx===round.dilemmas.length-1;
    const isLastRound=roundIdx===ROUNDS.length-1;
    let btnLabel="Confirm \u2014 next decision  \u2192";
    if(isLastDilemma)btnLabel=isLastRound?"Confirm \u2014 see your Saga  \u2192":"Confirm \u2014 end round  \u2192";
    return R("div",{style:{...W,maxWidth:"min(920px, 94vw)"}},TopBar(),
      R("div",{className:"eyebrow",style:{marginBottom:6}},"\u2694\ufe0f  Entscheidungsdilemma"),
      R("div",{className:"dilemma-progress"},"Decision ",dilemmaIdx+1," / ",round.dilemmas.length," this round"),
      R("div",{className:"disp",style:{fontSize:"clamp(20px,2.8vw,25px)",fontWeight:600,marginBottom:22,color:"var(--parchment)",lineHeight:1.5}},d.scenario),
      R("div",{style:{display:"flex",flexDirection:"column",gap:16,marginBottom:24}},d.options.map(opt=>{
        const isChosen=dilemmaChoice===opt.label;const isLocked=!!dilemmaChoice;
        return R("div",{key:opt.label,className:"opt"+(isChosen?" sel":"")+(isLocked?" locked":""),onClick:()=>pickDilemma(opt)},
          R("div",{style:{display:"flex",gap:16,alignItems:"flex-start"}},
            R("div",{style:{minWidth:38,height:38,borderRadius:10,background:isChosen?"var(--bronze)":"rgba(42,33,24,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:isChosen?"#fff":"var(--ink2)",flexShrink:0}},opt.label),
            R("div",{style:{flex:1}},
              R("div",{style:{fontSize:19,fontWeight:600,marginBottom:7,color:"var(--ink)",lineHeight:1.4}},opt.name),
              R("div",{style:{fontSize:16,color:"var(--ink2)",fontStyle:"italic",lineHeight:1.5,marginBottom:isChosen?12:0}},opt.hint),
              isChosen&&R("div",{style:{display:"flex",gap:16,flexWrap:"wrap",fontSize:16}},
                [["Fame",opt.fame,"var(--ember)"],["Wealth",opt.wealth,"var(--gold)"],["Land",opt.land,"var(--teal)"]].filter(x=>x[1]).map(([l,v,c])=>
                  R("span",{key:l,style:{fontWeight:700,color:c}},l+" "+fmtDelta(v)))
              )
            )
          ));
      })),
      R("button",{onClick:nextDilemma,disabled:!dilemmaChoice,className:"pri",style:{width:"100%",fontSize:19,padding:"15px"}},btnLabel)
    );
  }

  /* ── FINAL ── */
  if(screen==="final"){
    const[label,icon,blurb]=legacyTitle(stats);
    return R("div",{style:{...W,textAlign:"center",maxWidth:"min(920px, 94vw)"}},
      R("div",{style:{fontSize:16,color:"var(--parchment)",opacity:.8,marginBottom:6}},group),
      R("div",{className:"disp",style:{fontSize:"clamp(30px,4vw,40px)",fontWeight:700,marginBottom:8}},"The Saga is Told"),
      R("div",{style:{fontSize:16,color:"var(--parchment)",opacity:.75,marginBottom:34}},"Four rounds, twelve decisions complete"),
      R("div",{className:"card",style:{marginBottom:26}},
        R("div",{style:{fontSize:15,color:"var(--ink2)",marginBottom:12}},"Your clan will be remembered as"),
        R("div",{style:{display:"inline-flex",alignItems:"center",gap:12,padding:"13px 30px",borderRadius:100,background:"var(--bronze-pale)"}},
          R("i",{className:"ti "+icon,style:{fontSize:24,color:"var(--bronze)"}}),R("span",{className:"disp",style:{fontSize:24,fontWeight:700,color:"var(--ink)"}},"The "+label)),
        R("div",{style:{fontSize:16,color:"var(--ink2)",marginTop:16,lineHeight:1.7}},blurb)
      ),
      R("div",{className:"g4",style:{marginBottom:30}},[["Fame","ti-flame",stats.fame,"var(--ember)"],["Wealth","ti-coins",stats.wealth,"var(--gold)"],["Land","ti-map",stats.land,"var(--teal)"],["Knowledge","ti-books",stats.knowledge,"var(--bronze)"]].map(([l,i,v,c])=>
        R("div",{key:l,className:"card",style:{textAlign:"center"}},R("i",{className:"ti "+i,style:{fontSize:24,color:c}}),R("div",{style:{fontSize:28,fontWeight:700,marginTop:8,color:"var(--ink)"}},v),R("div",{style:{fontSize:15,color:"var(--ink2)"}},l))
      )),
      R("div",{style:{fontSize:16,color:"var(--parchment)",opacity:.75,marginBottom:22,fontStyle:"italic"}},"Bring this profile to the class debate: were the Vikings migrants?"),
      R("button",{onClick:()=>setScreen("lb"),className:"pri",style:{width:"100%",fontSize:19,padding:"15px"}},"View the leaderboard  \u2192")
    );
  }

  /* ── LEADERBOARD ── */
  if(screen==="lb"){const sorted=[...lb].sort((a,b)=>b.total-a.total);return R("div",{style:W},
    R("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
      R("div",{className:"disp",style:{fontSize:"clamp(26px,3.4vw,32px)",fontWeight:700}},"Leaderboard"),
      R("button",{onClick:loadLb,style:{fontSize:16}},R("i",{className:"ti ti-refresh",style:{marginRight:7}}),"Refresh")),
    R("div",{style:{fontSize:17,color:"var(--parchment)",opacity:.8,marginBottom:28}},sorted.length," clan",sorted.length!==1?"s":""," \u00b7 sorted by total saga points"),
    lbLoad&&R("div",{style:{color:"var(--parchment)",opacity:.7,fontSize:17,marginBottom:18}},"Loading..."),
    sorted.length===0&&!lbLoad&&R("div",{style:{color:"var(--parchment)",opacity:.7,fontSize:18}},"No clans yet."),
    sorted.map((e,i)=>R("div",{key:e.name,className:"lbr"+(e.name===group?" me":"")},
      R("div",{style:{display:"flex",gap:18,alignItems:"center"}},
        R("div",{style:{fontSize:24,fontWeight:700,color:"var(--ink3)",width:36,textAlign:"center"}},i+1),
        R("div",{style:{width:12,height:12,borderRadius:"50%",background:e.color||"var(--bronze)"}}),
        R("div",null,R("div",{style:{fontSize:19,fontWeight:600,color:"var(--ink)"}},e.name),
          R("div",{style:{fontSize:14,color:"var(--ink2)"}},e.done?"Saga complete":"Round "+e.round+" / "+ROUNDS.length))),
      R("div",{style:{fontSize:24,fontWeight:700,color:"var(--bronze2)"}},e.total))),
    R("button",{onClick:()=>setScreen("start"),className:"ghost",style:{marginTop:20,width:"100%",fontSize:16}},"New saga")
  );}

  /* ── TEACHER ── */
  if(screen==="teacher"){
    if(!tauth)return R("div",{style:{maxWidth:"min(420px, 94vw)",margin:"0 auto",padding:"4.5rem 2rem",textAlign:"center"}},
      R("div",{style:{width:64,height:64,borderRadius:16,background:"rgba(239,230,211,0.9)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 22px"}},R("i",{className:"ti ti-lock",style:{fontSize:30,color:"var(--ink2)"}})),
      R("div",{className:"disp",style:{fontSize:24,fontWeight:700,marginBottom:30,color:"var(--parchment)"}},"Teacher dashboard"),
      R("input",{type:"password",placeholder:"Passcode",value:tpw,onChange:e=>setTpw(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&tpw===TEACHER_PASS)setTauth(true);},style:{marginBottom:14}}),
      R("button",{onClick:()=>{if(tpw===TEACHER_PASS)setTauth(true);},className:"pri",style:{width:"100%",fontSize:18,padding:"14px",marginBottom:12}},"Access dashboard"),
      R("button",{onClick:()=>setScreen("start"),className:"ghost",style:{width:"100%",fontSize:16}},"Back"));
    const sorted=[...lb].sort((a,b)=>b.total-a.total);
    return R("div",{style:{maxWidth:"min(1280px, 94vw)",margin:"0 auto",padding:"clamp(1.8rem,3vw,2.8rem) clamp(1rem,3vw,2.4rem)"}},
      R("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        R("div",{className:"disp",style:{fontSize:26,fontWeight:700}},"Teacher dashboard"),
        R("button",{onClick:async()=>{if(window.confirm("Reset all clans? This cannot be undone.")){await clearScores();setLb([]);}},style:{fontSize:16,color:"var(--ember)"}},R("i",{className:"ti ti-trash",style:{marginRight:7}}),"Reset all")),
      R("div",{style:{display:"flex",alignItems:"center",marginBottom:30,fontSize:16,color:"var(--parchment)",opacity:.8}},R("span",{className:"ldot"}),"Live \u00b7 real-time \u00b7 ",sorted.length," clan",sorted.length!==1?"s":""," registered"),
      sorted.length===0&&R("div",{style:{color:"var(--parchment)",opacity:.7,fontSize:18,marginBottom:20}},"No clans have started yet."),
      R("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))",gap:16,marginBottom:32}},sorted.map((e,i)=>R("div",{key:e.name,className:"card"},
        R("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},R("div",{style:{fontSize:14,color:"var(--ink2)"}},"#",i+1),R("div",{style:{fontSize:14,color:e.done?"var(--teal)":"var(--ink2)"}},e.done?"Complete":"Round "+e.round+"/"+ROUNDS.length)),
        R("div",{style:{display:"flex",alignItems:"center",gap:9,marginBottom:12}},R("div",{style:{width:12,height:12,borderRadius:"50%",background:e.color||"var(--bronze)",flexShrink:0}}),R("div",{style:{fontSize:18,fontWeight:600,wordBreak:"break-word",color:"var(--ink)"}},e.name)),
        R("div",{style:{fontSize:28,fontWeight:700,color:"var(--bronze2)",marginBottom:10}},e.total),
        R("div",{style:{display:"flex",gap:12,fontSize:14,color:"var(--ink2)"}},R("span",null,"F ",e.fame),R("span",null,"W ",e.wealth),R("span",null,"L ",e.land),R("span",null,"K ",e.knowledge))
      ))),
      R("button",{onClick:()=>{setTauth(false);setTpw("");setScreen("start");},className:"ghost",style:{fontSize:16}},"Exit")
    );
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(R(App));
</script>
